version: '3.8'

services:
  users-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: users-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: users_db
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  users-db:
    image: postgres:15-alpine
    container_name: users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - '5432:5432'
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

volumes:
  users_db_data:

networks:
  ecommerce-network:
    external: true
    name: ecommerce-network